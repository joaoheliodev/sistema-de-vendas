# =============================================================================
# CyberSeg — Cloudflare WAF & Proxy Reversa — Guia de Configuração
# =============================================================================
# Arquitetura de Rede:
#
#   [Usuário] --(HTTPS/TLS 1.3)--> [Cloudflare Edge]
#          ↓                              ↓
#    DDoS Mitigation              WAF Rules Engine
#    Bot Detection                Rate Limiting
#    Geo-Blocking                 IP Reputation
#          ↓                              ↓
#   [Cloudflare Proxy] --(HTTPS)--> [Origin Server (Vercel/VPS)]
#                                         ↓
#                                   [Vite Static Build]
#
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# PASSO 1: Configuração DNS no Cloudflare
# ─────────────────────────────────────────────────────────────────────────────
#
# 1. Crie uma conta gratuita em https://dash.cloudflare.com
# 2. Adicione seu domínio (ex: cyberseg.com.br)
# 3. Aponte os nameservers do seu registrador para os da Cloudflare:
#      ns1.cloudflare.com
#      ns2.cloudflare.com
# 4. No painel DNS, crie os registros:
#      Type: A      Name: @       Content: <IP_DO_SERVIDOR>   Proxy: ON (☁️)
#      Type: CNAME  Name: www     Content: cyberseg.com.br    Proxy: ON (☁️)
#
# IMPORTANTE: O ícone de nuvem laranja (Proxied) DEVE estar ativo para que
# todo o tráfego passe pela rede Cloudflare antes de chegar ao seu servidor.

# ─────────────────────────────────────────────────────────────────────────────
# PASSO 2: SSL/TLS Settings
# ─────────────────────────────────────────────────────────────────────────────
#
# No painel Cloudflare → SSL/TLS:
#
#   Encryption Mode:       Full (Strict)
#   Minimum TLS Version:   TLS 1.2
#   TLS 1.3:               Enabled
#   Automatic HTTPS:       Enabled
#   Always Use HTTPS:      ON
#   Opportunistic Encryption: ON
#   HSTS:                  Enabled (max-age=31536000; includeSubDomains; preload)
#
# Edge Certificates → Cipher Suites:
#   Ativar apenas suites com Forward Secrecy (ECDHE)
#   Desativar RC4, 3DES, CBC mode ciphers

# ─────────────────────────────────────────────────────────────────────────────
# PASSO 3: WAF Rules (Web Application Firewall)
# ─────────────────────────────────────────────────────────────────────────────
#
# Cloudflare → Security → WAF:
#
# 3a. Managed Rulesets (ativar todos):
#   ✅ Cloudflare Managed Ruleset
#   ✅ Cloudflare OWASP Core Ruleset
#   ✅ Cloudflare Leaked Credentials Detection
#
# 3b. Custom WAF Rules (criar manualmente):
#
#   REGRA 1: Bloquear países fora do Brasil (opcional, reduz superfície)
#   ┌─────────────────────────────────────────────────────────┐
#   │ Expression: (ip.geoip.country ne "BR")                 │
#   │ Action:     Managed Challenge                           │
#   │ Name:       "GeoBlock — Non-BR Challenge"               │
#   └─────────────────────────────────────────────────────────┘
#
#   REGRA 2: Bloquear User-Agents maliciosos conhecidos
#   ┌─────────────────────────────────────────────────────────┐
#   │ Expression: (http.user_agent contains "sqlmap") or      │
#   │             (http.user_agent contains "nikto") or       │
#   │             (http.user_agent contains "nmap") or        │
#   │             (http.user_agent contains "masscan") or     │
#   │             (http.user_agent contains "ZmEu") or        │
#   │             (http.user_agent eq "")                     │
#   │ Action:     Block                                       │
#   │ Name:       "Block Malicious Scanners"                  │
#   └─────────────────────────────────────────────────────────┘
#
#   REGRA 3: Proteger rota de checkout contra abuso
#   ┌─────────────────────────────────────────────────────────┐
#   │ Expression: (http.request.uri.path contains "/checkout")│
#   │             and (cf.threat_score gt 14)                 │
#   │ Action:     Managed Challenge (CAPTCHA)                 │
#   │ Name:       "Checkout Threat Score Gate"                │
#   └─────────────────────────────────────────────────────────┘

# ─────────────────────────────────────────────────────────────────────────────
# PASSO 4: Rate Limiting
# ─────────────────────────────────────────────────────────────────────────────
#
# Cloudflare → Security → Rate Limiting Rules:
#
#   REGRA 1: Rate limit global
#   ┌─────────────────────────────────────────────────────────┐
#   │ Expression: (http.request.uri.path eq "*")              │
#   │ Characteristics: IP                                     │
#   │ Threshold: 100 requests per 60 seconds                 │
#   │ Mitigation: Block for 600 seconds (10 min)             │
#   │ Name:       "Global Rate Limit"                         │
#   └─────────────────────────────────────────────────────────┘
#
#   REGRA 2: Rate limit agressivo no checkout
#   ┌─────────────────────────────────────────────────────────┐
#   │ Expression: (http.request.uri.path contains "/checkout")│
#   │ Characteristics: IP                                     │
#   │ Threshold: 15 requests per 60 seconds                  │
#   │ Mitigation: Block for 3600 seconds (1 hora)            │
#   │ Name:       "Checkout Rate Limit"                       │
#   └─────────────────────────────────────────────────────────┘

# ─────────────────────────────────────────────────────────────────────────────
# PASSO 5: Bot Management & DDoS Protection
# ─────────────────────────────────────────────────────────────────────────────
#
# Cloudflare → Security → Bots:
#   Bot Fight Mode:         ON
#   Block AI Scrapers:      ON (opcional)
#   Super Bot Fight Mode:   ON (se disponível no plano)
#
# Cloudflare → Security → DDoS:
#   HTTP DDoS Attack Protection:    ON (padrão, já ativo)
#   Sensitivity:                    High
#   Action:                         Managed Challenge
#
# Cloudflare → Security → Settings:
#   Security Level:                 High
#   Challenge Passage:              30 minutes
#   Browser Integrity Check:        ON
#   Hotlink Protection:             ON

# ─────────────────────────────────────────────────────────────────────────────
# PASSO 6: Performance (complementar à segurança)
# ─────────────────────────────────────────────────────────────────────────────
#
# Cloudflare → Speed → Optimization:
#   Auto Minify:    JS ✅  CSS ✅  HTML ✅
#   Brotli:         ON
#   Early Hints:    ON
#   HTTP/2:         ON (padrão)
#   HTTP/3 (QUIC):  ON
#
# Cloudflare → Caching → Configuration:
#   Caching Level:      Standard
#   Browser Cache TTL:  1 year (assets com hash do Vite são imutáveis)
#
# Page Rules (se necessário):
#   URL: cyberseg.com.br/assets/*
#   Setting: Cache Level → Cache Everything, Edge Cache TTL → 1 month

# ─────────────────────────────────────────────────────────────────────────────
# PASSO 7: Validação de Origem (Authenticated Origin Pulls)
# ─────────────────────────────────────────────────────────────────────────────
#
# Para garantir que APENAS a Cloudflare possa se comunicar com seu servidor:
#
# 1. Cloudflare → SSL/TLS → Origin Server:
#    Ative "Authenticated Origin Pulls"
#
# 2. No Nginx do servidor de origem, adicione:
#    ssl_client_certificate /etc/nginx/cloudflare-origin-pull-ca.pem;
#    ssl_verify_client on;
#
# 3. Baixe o certificado CA da Cloudflare:
#    https://developers.cloudflare.com/ssl/origin-configuration/authenticated-origin-pull/
#
# 4. Configure o firewall do servidor para aceitar APENAS IPs da Cloudflare:
#    https://www.cloudflare.com/ips/
#    Bloqueie TODO o resto na porta 443.
