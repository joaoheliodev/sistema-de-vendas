# =============================================================================
# CyberSeg — Nginx Security Configuration
# TLS 1.2/1.3 Hardening + HTTP/2 + Security Headers
# =============================================================================
# INSTRUÇÕES: Este arquivo deve ser incluído no bloco server{} do seu nginx.conf
# principal ou usado como referência para configuração no painel do provedor.
#
# Caminho sugerido: /etc/nginx/conf.d/cyberseg-security.conf
# Incluir no server block: include /etc/nginx/conf.d/cyberseg-security.conf;
# =============================================================================

# -----------------------------------------------------------------------------
# 1. TRANSPORTE SEGURO — TLS 1.2 / 1.3 STRICT
# -----------------------------------------------------------------------------
# Desativa TLS 1.0 e 1.1 (vulneráveis a POODLE, BEAST, CRIME)
# Força exclusivamente TLS 1.2 e TLS 1.3
ssl_protocols TLSv1.2 TLSv1.3;

# Cipher Suites — apenas algoritmos com Forward Secrecy (ECDHE)
# e autenticação forte (ECDSA/RSA com AES-GCM ou ChaCha20)
# Ordem definida pelo servidor (não pelo cliente)
ssl_prefer_server_ciphers on;
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

# Curvas elípticas seguras para ECDHE key exchange
ssl_ecdh_curve X25519:secp384r1:secp256r1;

# Sessão TLS — otimizar handshakes sem comprometer segurança
ssl_session_timeout 1d;
ssl_session_cache shared:CyberSegTLS:10m;
ssl_session_tickets off;  # Desativa session tickets (vulnerável a replay attacks)

# OCSP Stapling — verificação de certificado sem latência extra
ssl_stapling on;
ssl_stapling_verify on;
resolver 1.1.1.1 1.0.0.1 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# Diffie-Hellman Parameters — gerar com:
#   openssl dhparam -out /etc/nginx/dhparam.pem 4096
ssl_dhparam /etc/nginx/dhparam.pem;

# -----------------------------------------------------------------------------
# 2. HTTP/2 — MULTIPLEXAÇÃO SEGURA SOBRE TCP
# -----------------------------------------------------------------------------
# HTTP/2 é ativado no bloco listen:
#   listen 443 ssl http2;
#   listen [::]:443 ssl http2;
#
# Benefícios: multiplexação de streams, compressão HPACK de headers,
# server push, eliminação de head-of-line blocking na camada HTTP.

# -----------------------------------------------------------------------------
# 3. CABEÇALHOS DE SEGURANÇA HTTP
# -----------------------------------------------------------------------------

# HSTS — Força HTTPS por 1 ano + includeSubDomains + preload
# Após confirmar que tudo funciona via HTTPS, submeta em https://hstspreload.org
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# CSP — Content Security Policy
# Restringe scripts ao próprio domínio, Google Fonts e gateway de pagamento
# Ajuste 'https://pay.hotmart.com' ou 'https://pay.kiwify.com.br' conforme seu gateway
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://pay.hotmart.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://pay.hotmart.com; frame-src https://pay.hotmart.com; object-src 'none'; base-uri 'self'; form-action 'self' https://pay.hotmart.com; frame-ancestors 'none'; upgrade-insecure-requests;" always;

# X-Content-Type-Options — Previne MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# X-Frame-Options — Proteção contra Clickjacking
add_header X-Frame-Options "DENY" always;

# X-XSS-Protection — Camada extra para navegadores legados
add_header X-XSS-Protection "1; mode=block" always;

# Referrer-Policy — Limita vazamento de informações via Referer header
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions-Policy — Restringe acesso a APIs do navegador
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;

# Cross-Origin Policies — Isolamento de recursos
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;

# Cache-Control para arquivos estáticos (assets Vite com hash)
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# -----------------------------------------------------------------------------
# 4. PROTEÇÕES ADICIONAIS NA CAMADA DE APLICAÇÃO
# -----------------------------------------------------------------------------

# Esconde a versão do Nginx (fingerprinting prevention)
server_tokens off;

# Limita o tamanho do body (previne ataques de payload gigante)
client_max_body_size 1m;

# Rate limiting na camada Nginx (complementa Cloudflare WAF)
# Definir na seção http{} do nginx.conf principal:
#   limit_req_zone $binary_remote_addr zone=cyberseg_limit:10m rate=10r/s;
# Aplicar no location:
#   limit_req zone=cyberseg_limit burst=20 nodelay;

# Bloqueia acesso a arquivos sensíveis
location ~ /\. {
    deny all;
    return 404;
}

location ~ \.(env|git|gitignore|htaccess|htpasswd|ini|log|sh|sql|bak|swp)$ {
    deny all;
    return 404;
}
